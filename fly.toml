app = "old-streets"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  PORT = "8080"
  PUBLIC_URL = "https://old-streets.fly.dev"

[[mounts]]
  source = "data"
  destination = "/app/data"
  initial_size = "1gb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 400
    soft_limit = 200

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
