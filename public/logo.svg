<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Old Streets">
  <defs>
    <linearGradient id="osBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#4a6cb4"/>
      <stop offset="100%" stop-color="#2f477b"/>
    </linearGradient>
    <linearGradient id="osShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="55%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- card background -->
  <rect x="2" y="2" width="60" height="60" rx="10" ry="10" fill="url(#osBg)" stroke="#1d2c50" stroke-width="2"/>
  <!-- subtle top shine -->
  <rect x="4" y="4" width="56" height="28" rx="8" ry="8" fill="url(#osShine)"/>
  <!-- pixel-grid accents -->
  <g fill="rgba(255,255,255,0.18)">
    <rect x="7"  y="50" width="2" height="2"/>
    <rect x="11" y="50" width="2" height="2"/>
    <rect x="15" y="50" width="2" height="2"/>
    <rect x="51" y="50" width="2" height="2"/>
    <rect x="55" y="50" width="2" height="2"/>
    <rect x="51" y="46" width="2" height="2"/>
  </g>
  <!-- "OS" monogram (serif slabs) -->
  <g fill="#fff" font-family="'Times New Roman', Georgia, serif" font-weight="900">
    <text x="32" y="42" text-anchor="middle" font-size="32" letter-spacing="-1">OS</text>
  </g>
  <!-- street-sign arrow tag underneath -->
  <g transform="translate(20,46)" fill="#ffd84a" stroke="#1d2c50" stroke-width="1">
    <polygon points="0,0 22,0 26,3 22,6 0,6"/>
  </g>
</svg>
