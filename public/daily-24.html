<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Daily 24 · Old Streets</title>
<link rel="stylesheet" href="/chrome.css?v=20260513y"/>
<script src="/chrome.js?v=20260515c"></script>
</head>
<body>
<div class="page-wrap">
  <div class="hello-bar"><h1 class="hello-h1">📸 Daily 24</h1></div>
  <div class="url-bar"><div class="url-left"><span class="url-mono">today's photos · vote on pairs · top 24 win the day</span></div></div>

  <div class="cols two">
    <div class="col col-center">
      <div class="widget">
        <div class="widget-title"><span>Vote on a Pair</span><span class="wt-right"><a href="#" id="skip-pair">skip</a></span></div>
        <div class="widget-body" id="pair-mount"><div class="empty">loading…</div></div>
      </div>
      <div class="widget">
        <div class="widget-title green"><span>Submit Today's Photo</span></div>
        <div class="widget-body">
          <p class="muted" style="margin:0 0 6px;">drop a photo. one a day.</p>
          <input type="file" accept="image/*" id="ph-file" style="display:none;"/>
          <div id="ph-zone" data-drop-zone="d24" style="border:2px dashed var(--msp-rule); padding:24px; text-align:center; color:var(--msp-mute); cursor:pointer;">click to choose, or drop a photo here.</div>
          <div id="ph-preview" style="margin-top:10px; display:none;">
            <img id="ph-img" style="max-width:100%; max-height:240px;"/>
            <div class="row-flex" style="margin-top:6px;">
              <input id="ph-caption" type="text" style="flex:1;" placeholder="caption (optional)" maxlength="120"/>
              <button class="btn" id="ph-submit">Submit</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="col col-right">
      <div class="widget">
        <div class="widget-title"><span>🏆 Leaderboard</span></div>
        <div class="widget-body none" id="board"><div class="empty">loading…</div></div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const TOKEN = localStorage.getItem('oldstreets-token') || sessionStorage.getItem('oldstreets-token');
  if (!TOKEN) { location.replace('/onboard.html'); return; }
  const $ = (id) => document.getElementById(id);
  function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  async function api(path, opts){ opts=opts||{}; opts.headers=Object.assign({'Content-Type':'application/json','X-User-Token':TOKEN}, opts.headers||{}); const r=await fetch(path,opts); const j=await r.json().catch(()=>({})); if(!r.ok) throw new Error(j.error||j.message||'http '+r.status); return j; }

  async function loadPair(){
    try {
      const p = await api('/api/daily-24/pair');
      if (!p || !p.a || !p.b) { $('pair-mount').innerHTML = '<div class="empty">no pair available — try again soon.</div>'; return; }
      $('pair-mount').innerHTML = `<div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        ${[p.a, p.b].map(c => `<div class="pair-card" data-id="${esc(c.id)}" style="background:#fff; border:1px solid var(--msp-rule); padding:4px; cursor:pointer; text-align:center;">
          <img src="${esc(c.url || c.content)}" style="width:100%; aspect-ratio:1; object-fit:cover; display:block;"/>
          <div class="url-mono" style="padding:4px 0;">${esc(c.author||'')} · ${c.votes||0} votes</div>
        </div>`).join('')}
      </div>`;
      document.querySelectorAll('.pair-card').forEach(c => c.addEventListener('click', async () => {
        try { await api('/api/daily-24/vote', { method:'POST', body: JSON.stringify({ pairId: p.id, winnerId: c.dataset.id }) }); loadPair(); loadBoard(); }
        catch (e) { alert(e.message); }
      }));
    } catch { $('pair-mount').innerHTML = '<div class="empty">could not load pair.</div>'; }
  }
  async function loadBoard(){
    try {
      const data = await api('/api/daily-24/leaderboard');
      const list = data.leaderboard || data || [];
      if (!list.length) { $('board').innerHTML = '<div class="empty">no submissions yet today.</div>'; return; }
      $('board').innerHTML = list.slice(0,24).map((c, i) => `
        <div class="os-row">
          <div style="font-weight:700; color:var(--msp-blue-d); width:18px;">${i+1}</div>
          <img src="${esc(c.url || c.content)}" style="width:46px; height:46px; object-fit:cover; border:1px solid var(--msp-rule);"/>
          <div class="body"><div class="name">${esc(c.author||'?')}</div><div class="ts">${c.votes||0} votes</div></div>
        </div>`).join('');
    } catch { $('board').innerHTML = '<div class="empty">could not load.</div>'; }
  }
  $('ph-zone').addEventListener('click', () => $('ph-file').click());
  $('ph-file').addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = () => { $('ph-img').src = r.result; $('ph-preview').style.display=''; }; r.readAsDataURL(f);
  });
  $('ph-submit').addEventListener('click', async () => {
    const url = $('ph-img').src; if (!url) return;
    const cap = $('ph-caption').value.trim();
    try { await api('/api/daily-24/submit', { method:'POST', body: JSON.stringify({ content: url, caption: cap }) }); $('ph-preview').style.display='none'; $('ph-caption').value=''; alert('submitted ✓'); loadBoard(); }
    catch (e) { alert(e.message); }
  });
  $('skip-pair').addEventListener('click', e => { e.preventDefault(); loadPair(); });
  loadPair(); loadBoard();
})();
</script>
</body>
</html>
